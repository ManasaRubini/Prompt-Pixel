<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Prompt Pixel — Text to Image</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <div class="wrap">
    <h1 style="color: white;font-family:cursive;font-size:40px;" >🎨Prompt Pixel</h1>
    <p class="sub">Enter a prompt and click Generate</p>

    <textarea id="prompt" placeholder='e.g. "A serene lake at sunrise with misty mountains"'>
A fantasy landscape, ultra-detailed, cinematic lighting
    </textarea>

    <div class="controls">
      <label>Width <input id="width" type="number" value="400" min="256" max="1024"></label>
      <label>Height <input id="height" type="number" value="400" min="256" max="1024"></label>
      <label>Steps <input id="steps" type="number" value="10" min="1" max="150"></label>
      <label>Guidance <input id="guidance" type="number" value="7.5" step="0.1" min="1" max="20"></label>
    </div>

    <div class="action-row">
      <button id="generateBtn">Generate</button>
      <span id="progressText" class="progress"></span>
      <span id="status" class="status"></span>
    </div>

    <div id="result" class="result">
      <img id="resultImage" src="{{ url_for('static', filename='img/pp.png') }}" 
           alt="Prompt Pixel Logo" width="300" style="border-radius:12px;">
      <div id="downloadArea" style="margin-top:8px;"></div>
    </div>

    <hr />
    <p class="note">
     
    </p>
  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
